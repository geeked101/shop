<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoeVerse | Online Shoe Shop</title>
  <link rel="stylesheet" href="style.css" />
  <script>
  if (localStorage.getItem("theme") === "dark") {
    document.documentElement.classList.add("dark");
  }
</script>

</head>
<body>
  <header>
    <h1>👟 ShoeVerse</h1>
    <div class="actions">
      <button id="themeToggle">🌙 Dark Mode</button>
      <button id="viewCart">🛒 View Cart (<span id="cartCount">0</span>)</button>
    </div>
  </header>

  <main>
    <section class="product-list">
      <div class="product">
        <img src="images\MENS NIKE AIR MAX 1.jpeg" alt="Nike Air" />
        <h3>Nike Air Max</h3>
        <p>$120</p>
        <button class="addCart" data-name="Nike Air Max" data-price="120">Add to Cart</button>
      </div>

      <div class="product">
        <img src="images\Adidas Yeezy Foam Runner Carbon Slides - Black.jpeg" alt="Adidas Yeezy" />
        <h3>Adidas Yeezy</h3>
        <p>$250</p>
        <button class="addCart" data-name="Adidas Yeezy" data-price="250">Add to Cart</button>
      </div>

      <div class="product">
        <img src="images\Schwarze Sneaker mit weißem Profil Court Classic Clean Puma - Schwarze Sneaker mit weißem Profil Court Classic Clean Puma.jpeg" alt="Puma Classic" />
        <h3>Puma Classic</h3>
        <p>$90</p>
        <button class="addCart" data-name="Puma Classic" data-price="90">Add to Cart</button>
      </div>
    </section>

    <section class="cart-modal hidden" id="cartModal">
      <h2>Your Cart</h2>
      <ul id="cartItems"></ul>
      <p id="cartTotal">Total: $0</p>
      <button id="closeCart">Close</button>
    </section>
  </main>

  <footer>
    <p>© 2025 ShoeVerse | Built with ❤️ by Jeff</p>
  </footer>

  <script src="cart.js"></script>
  <script src="theme-toggle.js"></script>
</body>
</html>
